version: "3.9"

services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: benchmark_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  redis:
    image: redis:7.2-alpine
    container_name: benchmark_redis
    ports:
      - "6379:6379"
    command: redis-server
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
