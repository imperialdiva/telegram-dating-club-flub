services:
  db:
    image: ${POSTGRES_IMAGE:-postgres:15}
    container_name: ${CONTAINER_DB_NAME:-dating_db}
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - dating_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dating_network

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: ${CONTAINER_REDIS_NAME:-dating_redis}
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dating_network

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: ${CONTAINER_RABBITMQ_NAME:-dating_rabbitmq}
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-dating}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-dating}
    ports:
      - "${RABBITMQ_HOST_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dating_network

  minio:
    image: minio/minio:latest
    container_name: ${CONTAINER_MINIO_NAME:-dating_minio}
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - dating_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dating_network

  minio-init:
    image: minio/mc:latest
    container_name: dating_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      (mc mb local/${MINIO_BUCKET:-photos} || true) &&
      mc anonymous set download local/${MINIO_BUCKET:-photos} &&
      echo 'minio bucket ready' "
    networks:
      - dating_network

  backend:
    build: ./backend
    container_name: ${CONTAINER_BACKEND_NAME:-dating_backend}
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://dating:dating@rabbitmq:5672/}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-http://minio:9000}
      - MINIO_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-photos}
      - MINIO_REGION=${MINIO_REGION:-us-east-1}
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    networks:
      - dating_network

  celery_worker:
    build: ./backend
    container_name: ${CONTAINER_CELERY_WORKER_NAME:-dating_celery_worker}
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: ["celery", "-A", "celery_app.celery_app", "worker", "--pool=solo", "--loglevel=info"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://dating:dating@rabbitmq:5672/}
    networks:
      - dating_network

  celery_beat:
    build: ./backend
    container_name: ${CONTAINER_CELERY_BEAT_NAME:-dating_celery_beat}
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "celery_app.celery_app", "beat", "--loglevel=info"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    networks:
      - dating_network

  rating_consumer:
    build: ./backend
    container_name: dating_rating_consumer
    restart: always
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "consumer.py"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://dating:dating@rabbitmq:5672/}
    networks:
      - dating_network

  bot:
    build: ./bot
    container_name: ${CONTAINER_BOT_NAME:-dating_bot}
    restart: always
    depends_on:
      - backend
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - BACKEND_URL=${BACKEND_URL:-http://backend:8000}
    networks:
      - dating_network

volumes:
  dating_pgdata:
  dating_minio_data:

networks:
  dating_network:
    name: ${NETWORK_NAME:-dating_network}
    driver: ${NETWORK_DRIVER:-bridge}
